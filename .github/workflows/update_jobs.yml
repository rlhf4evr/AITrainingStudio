name: 🤖 Auto-Update Job Board

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
  

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🔍 Scrape job platforms
        env:
          MERCOR_REFERRAL_URL: ${{ secrets.MERCOR_REFERRAL_URL }}
          MICRO1_REFERRAL_URL: ${{ secrets.MICRO1_REFERRAL_URL }}
          TERAC_REFERRAL_URL:  ${{ secrets.TERAC_REFERRAL_URL }}
        run: python scraper/scrape_jobs.py

      - name: 🎨 Generate job board HTML
        run: python scraper/generate_html.py

      - name: ✍️  Draft LinkedIn posts for new roles
        run: python scraper/draft_linkedin.py

      - name: 📤 Commit and push updated files
        run: |
          git config user.name  "AI Training Studio Bot"
          git config user.email "bot@aitraining.studio"
          git add output/jobs.json output/jobs.html output/linkedin_drafts.md output/posted_ids.json
          git diff --staged --quiet || git commit -m "🤖 Job board update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
